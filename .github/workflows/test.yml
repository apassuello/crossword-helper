name: Tests & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-xdist pytest-mock

    - name: Run unit tests
      run: |
        pytest backend/tests/unit cli/tests/unit -v --cov=backend --cov=cli --cov-report=xml --cov-report=term -n auto

    - name: Run integration tests
      run: |
        pytest backend/tests/integration cli/tests/integration -v --cov=backend --cov=cli --cov-append --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.python-version }}
        fail_ci_if_error: false

    - name: Generate coverage HTML report
      if: matrix.python-version == '3.12'
      run: |
        pytest --cov=backend --cov=cli --cov-report=html

    - name: Upload coverage HTML
      if: matrix.python-version == '3.12'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy

    - name: Run flake8
      run: |
        flake8 backend/ cli/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 backend/ cli/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check code formatting with black
      run: |
        black --check backend/ cli/ || true

    - name: Check import sorting with isort
      run: |
        isort --check-only backend/ cli/ || true

  # Performance job removed - benchmarks are manual scripts, not automated tests
  # Run manually when needed: python cli/tests/performance/benchmark_algorithms.py
  # See cli/tests/performance/README.md for details
