[pytest]
testpaths = backend/tests cli/tests tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Exclude legacy validation scripts (not pytest tests)
norecursedirs = tests/legacy .git __pycache__ *.egg-info dist build
addopts = -v -m "not slow" --cov=backend --cov=cli --cov-report=html --cov-report=term
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks tests as integration tests
    unit: marks tests as unit tests
